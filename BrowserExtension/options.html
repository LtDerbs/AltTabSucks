<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: monospace; font-size: 13px; padding: 16px; max-width: 360px; }
    label { display: block; margin-bottom: 6px; }
    input { width: 100%; box-sizing: border-box; padding: 4px; font-family: monospace; }
    button { margin-top: 10px; padding: 4px 12px; }
    #status { margin-top: 8px; color: green; min-height: 1em; }
  </style>
</head>
<body>
  <h2>AltTabSucks Options</h2>
  <label>
    Profile label (must be unique per browser profile)
    <input id="profile-name" type="text" placeholder="e.g. Default, Work, Personal">
  </label>
  <label>
    Auth token (shown by install-service.ps1 or in token.txt)
    <input id="auth-token" type="text" placeholder="paste token here">
  </label>
  <button id="save">Save</button>
  <div id="status"></div>
  <script src="options.js"></script>
</body>
</html>
